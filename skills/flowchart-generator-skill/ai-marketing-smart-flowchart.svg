<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- 泳道定义 -->
  <!-- Lane 1: 广告主 -->
  <rect x="0" y="60" width="300" height="840" fill="#F0F9FF" opacity="0.4"/>
  <rect x="0" y="0" width="300" height="60" fill="#3B82F6"/>
  <text x="150" y="38" text-anchor="middle" fill="white" font-size="18" font-weight="bold">广告主</text>

  <!-- Lane 2: 广告代理公司 -->
  <rect x="300" y="60" width="300" height="840" fill="#ECFDF5" opacity="0.4"/>
  <rect x="300" y="0" width="300" height="60" fill="#10B981"/>
  <text x="450" y="38" text-anchor="middle" fill="white" font-size="18" font-weight="bold">广告代理公司</text>

  <!-- Lane 3: AI服务商 -->
  <rect x="600" y="60" width="300" height="840" fill="#F5F3FF" opacity="0.4"/>
  <rect x="600" y="0" width="300" height="60" fill="#8B5CF6"/>
  <text x="750" y="38" text-anchor="middle" fill="white" font-size="18" font-weight="bold">AI服务商</text>

  <!-- Lane 4: 广告媒体平台 -->
  <rect x="900" y="60" width="300" height="840" fill="#FFFBEB" opacity="0.4"/>
  <rect x="900" y="0" width="300" height="60" fill="#F59E0B"/>
  <text x="1050" y="38" text-anchor="middle" fill="white" font-size="18" font-weight="bold">广告媒体平台</text>

  <!-- 泳道分隔线 -->
  <line x1="300" y1="60" x2="300" y2="900" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="600" y1="60" x2="600" y2="900" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="900" y1="60" x2="900" y2="900" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- 节点层 -->
  <g filter="url(#shadow)">
    <!-- 1. 需求发起 -->
    <rect x="60" y="120" width="180" height="60" rx="8" fill="white" stroke="#3B82F6" stroke-width="2"/>
    <text x="150" y="155" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="500">下达营销需求</text>
    <text x="250" y="120" fill="#3B82F6" font-size="20">❶</text>

    <!-- 2. 策略制定 -->
    <rect x="360" y="200" width="180" height="60" rx="8" fill="white" stroke="#10B981" stroke-width="2"/>
    <text x="450" y="235" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="500">制定策略与Prompt</text>
    <text x="550" y="200" fill="#10B981" font-size="20">❷</text>

    <!-- 3. AI模型准备 -->
    <rect x="660" y="200" width="180" height="60" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <text x="750" y="235" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="500">模型调优/LoRA训练</text>
    <text x="850" y="200" fill="#8B5CF6" font-size="20">❸</text>

    <!-- 4. AI批量生成 -->
    <rect x="660" y="300" width="180" height="60" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <text x="750" y="335" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="500">批量生成素材</text>
    <text x="850" y="300" fill="#8B5CF6" font-size="20">❹</text>

    <!-- 5. 筛选与精修 -->
    <rect x="360" y="400" width="180" height="60" rx="8" fill="white" stroke="#10B981" stroke-width="2"/>
    <text x="450" y="435" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="500">人工筛选与精修</text>
    <text x="550" y="400" fill="#10B981" font-size="20">❺</text>

    <!-- 6. 客户审核 -->
    <polygon points="150,480 240,530 150,580 60,530" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="150" y="535" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="500">素材审核?</text>
    <text x="240" y="490" fill="#3B82F6" font-size="20">❻</text>

    <!-- 7. 投放配置 -->
    <rect x="360" y="600" width="180" height="60" rx="8" fill="white" stroke="#10B981" stroke-width="2"/>
    <text x="450" y="635" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="500">广告计划配置</text>
    <text x="550" y="600" fill="#10B981" font-size="20">❼</text>

    <!-- 8. 智能分发 -->
    <rect x="960" y="680" width="180" height="60" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="1050" y="715" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="500">智能分发与展示</text>
    <text x="1150" y="680" fill="#F59E0B" font-size="20">❽</text>

    <!-- 9. 数据回传 -->
    <rect x="960" y="780" width="180" height="40" rx="20" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <text x="1050" y="805" text-anchor="middle" fill="#1E293B" font-size="12" font-weight="500">转化数据回传</text>
  </g>

  <!-- 连接线层 -->
  <g fill="none" stroke-width="2">
    <!-- 1 -> 2 -->
    <path d="M150,180 L150,230 L360,230" stroke="#94A3B8" marker-end="url(#arrow)"/>
    
    <!-- 2 -> 3 -->
    <path d="M540,230 L660,230" stroke="#94A3B8" marker-end="url(#arrow)"/>
    
    <!-- 3 -> 4 -->
    <path d="M750,260 L750,300" stroke="#94A3B8" marker-end="url(#arrow)"/>
    
    <!-- 4 -> 5 -->
    <path d="M750,360 L750,430 L540,430" stroke="#94A3B8" marker-end="url(#arrow)"/>
    
    <!-- 5 -> 6 -->
    <path d="M450,460 L450,530 L240,530" stroke="#94A3B8" marker-end="url(#arrow)"/>
    
    <!-- 6 -> 7 (Yes) -->
    <path d="M150,580 L150,630 L360,630" stroke="#3B82F6" marker-end="url(#arrow-blue)"/>
    <text x="200" y="620" fill="#3B82F6" font-size="12">通过</text>
    
    <!-- 6 -> 5 (No) -->
    <path d="M105,505 L105,430 L360,430" stroke="#EF4444" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
    <text x="110" y="470" fill="#EF4444" font-size="12">驳回修改</text>
    
    <!-- 7 -> 8 -->
    <path d="M540,630 L900,630 L900,710 L960,710" stroke="#94A3B8" marker-end="url(#arrow)"/>
    
    <!-- 8 -> 9 -->
    <path d="M1050,740 L1050,780" stroke="#94A3B8" marker-end="url(#arrow)"/>
    
    <!-- 9 -> 2 (Feedback Loop) -->
    <path d="M960,800 L30,800 L30,300 L360,300 L360,260" stroke="#F59E0B" stroke-dasharray="5,5" marker-end="url(#arrow-orange)"/>
    <text x="600" y="820" fill="#F59E0B" font-size="12">效果数据反馈 (优化策略)</text>
  </g>

</svg>